name: 0. Bootstrap ECR Registry

on:
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  TF_WORKING_DIR: notes-app/terraform/environments/prod

jobs:
  bootstrap:
    name: Bootstrap ECR
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Terraform Init
      working-directory: ${{ env.TF_WORKING_DIR }}
      run: terraform init

    - name: Terraform Apply (Target ECR Only)
      working-directory: ${{ env.TF_WORKING_DIR }}
      env:
        TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
      run: |
        # We only target the ECR repository so that the Build pipeline has somewhere to push the Docker image
        terraform apply -target=aws_ecr_repository.backend -auto-approve
