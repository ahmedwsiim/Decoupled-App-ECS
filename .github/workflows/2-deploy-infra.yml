name: 2. Deploy Infrastructure & ECS

on:
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: prod-notes-backend
  TF_WORKING_DIR: notes-app/terraform/environments/prod

jobs:
  deploy:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Terraform Init
      working-directory: ${{ env.TF_WORKING_DIR }}
      run: terraform init

    - name: Terraform Apply
      working-directory: ${{ env.TF_WORKING_DIR }}
      env:
        TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
      run: |
        # Deploys the infrastructure and updates the ECS container image to the 'latest' tag in ECR
        terraform apply -auto-approve -var="container_image=$ECR_REGISTRY/$ECR_REPOSITORY:latest"

    - name: Force ECS Service Deployment
      run: |
        # Tells the ECS Service to pull the newly updated 'latest' image from ECR and cycle the containers
        aws ecs update-service --cluster prod-cluster --service prod-service --force-new-deployment
